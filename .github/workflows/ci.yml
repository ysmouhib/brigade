name: tests
on:
  push:
  pull_request:
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e server/ pytest pytest-asyncio
      - name: Run the test suite (invariants, e2e, API, strategic policy)
        working-directory: server
        run: python -m pytest -q
